<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Grok Iframe Hub</title>
    <script src="https://tailwindcss.com"></script>
    <style>.iframe-wrapper { height: 450px; background: #111; border: 1px solid #333; }</style>
</head>
<body class="bg-black text-white flex h-screen">

    <aside class="w-80 border-r border-gray-800 flex flex-col p-4">
        <div id="chat-box" class="flex-grow overflow-y-auto space-y-2 text-sm"></div>
        <input id="user-input" class="w-full bg-gray-900 p-2 mt-2 rounded border border-gray-700" placeholder="Ask Grok to open a site...">
    </aside>

    <main id="iframe-grid" class="flex-grow p-4 grid grid-cols-2 gap-4 overflow-y-auto"></main>

    <script>
        const WORKER_URL = "https://workers.dev"; // YOUR DEPLOYED WORKER URL

        async function sendToGrok() {
            const input = document.getElementById('user-input');
            const message = input.value;
            if(!message) return;
            input.value = "";

            const response = await fetch(`${WORKER_URL}/grok`, {
                method: "POST",
                body: JSON.stringify({
                    model: "grok-beta",
                    messages: [{ role: "user", content: message }],
                    tools: [{
                        type: "function",
                        function: {
                            name: "manage_iframe",
                            description: "Open/close site iframes",
                            parameters: {
                                type: "object",
                                properties: {
                                    action: { type: "string", enum: ["open", "close"] },
                                    url: { type: "string" },
                                    id: { type: "string" }
                                },
                                required: ["action", "id"]
                            }
                        }
                    }]
                })
            });

            const data = await response.json();
            const tool = data.choices[0].message.tool_calls?.[0];
            if (tool) {
                const { action, url, id } = JSON.parse(tool.function.arguments);
                handleIframe(action, url, id);
            }
        }

        function handleIframe(action, url, id) {
            const grid = document.getElementById('iframe-grid');
            if (action === "open") {
                const div = document.createElement('div');
                div.id = `frame-${id}`;
                div.className = "iframe-wrapper rounded flex flex-col";
                // URL is passed through the Worker's bypass logic
                const proxiedUrl = `${WORKER_URL}/?url=${encodeURIComponent(url)}`;
                div.innerHTML = `
                    <div class="p-2 text-xs bg-gray-800 flex justify-between"><span>${id}</span></div>
                    <iframe src="${proxiedUrl}" class="flex-grow border-none"></iframe>`;
                grid.appendChild(div);
            } else {
                document.getElementById(`frame-${id}`)?.remove();
            }
        }

        document.getElementById('user-input').addEventListener('keypress', e => { if(e.key === 'Enter') sendToGrok(); });
    </script>
</body>
</html>
